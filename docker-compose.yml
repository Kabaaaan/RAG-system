services:
    api:
        image: python:3.12-slim
        working_dir: /app
        env_file:
            - .env
        environment:
            POSTGRES_HOST: postgresql
            QDRANT_HOST: qdrant
            REDIS_HOST: redis
            NATS_HOST: nats
        command: sh -c "pip install --no-cache-dir -r requirements.txt && python -m src.api"
        ports:
            - "${API_PORT:-8000}:8000"
        volumes:
            - .:/app
        depends_on:
            - postgresql
            - qdrant
            - redis
            - nats

    workers:
        image: python:3.12-slim
        working_dir: /app
        env_file:
            - .env
        environment:
            POSTGRES_HOST: postgresql
            QDRANT_HOST: qdrant
            REDIS_HOST: redis
            NATS_HOST: nats
        command: sh -c "pip install --no-cache-dir -r requirements.txt && python -m src.workers"
        volumes:
            - .:/app
        depends_on:
            - postgresql
            - qdrant
            - redis
            - nats

    postgresql:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    qdrant:
        image: qdrant/qdrant:latest
        ports:
            - "${QDRANT_PORT}:6333"
            - "${QDRANT_GRPC_PORT}:6334"
        volumes:
            - qdrant_data:/qdrant/storage

    redis:
        image: redis:7-alpine
        ports:
            - "${REDIS_PORT}:6379"
        volumes:
            - redis_data:/data

    nats:
        image: nats:2-alpine
        ports:
            - "${NATS_PORT}:4222"
            - "${NATS_MONITOR_PORT}:8222"
        command: ["-js", "-sd", "/data", "-m", "8222"]
        volumes:
            - nats_data:/data

volumes:
    postgres_data:
    qdrant_data:
    redis_data:
    nats_data:
